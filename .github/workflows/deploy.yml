name: Deploy Static Website

"on":
  push:
    branches: [main]
    paths: 
      - 'website/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: us-west-2

jobs:
  validate:
    name: Validate Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install HTML validator
        run: |
          npm install -g html-validate
          
      - name: Validate HTML files
        run: |
          if [ -d "website" ]; then
            find website -name "*.html" -exec html-validate {} \;
          else
            echo "No website directory found, skipping HTML validation"
          fi
          
      - name: Check for broken links (basic)
        run: |
          if [ -d "website" ]; then
            # Basic check for common broken link patterns
            echo "Checking for common broken link patterns..."
            if grep -r "href=\"#\"" website/ || grep -r "src=\"\"" website/; then
              echo "Warning: Found potential broken links"
              exit 1
            fi
            echo "Basic link validation passed"
          fi

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    permissions:
      id-token: write
      contents: read
    
    strategy:
      matrix:
        environment: 
          - ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
    
    environment: ${{ matrix.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Deploy
          
      - name: Get stack outputs
        id: stack-outputs
        run: |
          STACK_NAME="static-website-${{ matrix.environment }}"
          
          # Get S3 bucket name
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
            --output text)
          
          # Get CloudFront distribution ID
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text)
          
          echo "bucket-name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "distribution-id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT
          
          echo "Deploying to bucket: $BUCKET_NAME"
          echo "CloudFront distribution: $DISTRIBUTION_ID"
          
      - name: Create website directory if not exists
        run: |
          if [ ! -d "website" ]; then
            echo "Creating basic website structure..."
            mkdir -p website
            cat > website/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Zack Speak Fitness</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
                  .container { max-width: 800px; margin: 0 auto; }
                  h1 { color: #333; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Welcome to Zack Speak Fitness</h1>
                  <p>Your journey to fitness starts here.</p>
                  <p>This is a placeholder page. The full website is coming soon!</p>
              </div>
          </body>
          </html>
          EOF
            echo "Basic website created"
          fi
          
      - name: Sync files to S3
        run: |
          echo "Syncing website files to S3..."
          aws s3 sync website/ s3://${{ steps.stack-outputs.outputs.bucket-name }} \
            --delete \
            --exact-timestamps \
            --cache-control "public, max-age=86400" \
            --metadata-directive REPLACE
          
          echo "Files synced successfully"
          
      - name: Invalidate CloudFront cache
        run: |
          echo "Creating CloudFront invalidation..."
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack-outputs.outputs.distribution-id }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          
          echo "Invalidation created with ID: $INVALIDATION_ID"
          
          # Wait for invalidation to complete (optional, for verification)
          echo "Waiting for invalidation to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ steps.stack-outputs.outputs.distribution-id }} \
            --id "$INVALIDATION_ID"
          
          echo "Cache invalidation completed"
          
      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          
          # Check if files were uploaded to S3
          FILE_COUNT=$(aws s3 ls s3://${{ steps.stack-outputs.outputs.bucket-name }} --recursive | wc -l)
          echo "Files in S3 bucket: $FILE_COUNT"
          
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "Error: No files found in S3 bucket"
            exit 1
          fi
          
          # Get CloudFront domain name for verification
          DOMAIN_NAME=$(aws cloudformation describe-stacks \
            --stack-name "static-website-${{ matrix.environment }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`DomainName`].OutputValue' \
            --output text)
          
          echo "Website should be available at: https://$DOMAIN_NAME"
          echo "Deployment verification completed"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: always()
    
    steps:
      - name: Deployment Success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Website has been updated and cache invalidated."
          
      - name: Deployment Failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs above for details."
          exit 1
          
      - name: Validation Failure
        if: needs.validate.result == 'failure'
        run: |
          echo "❌ File validation failed!"
          echo "Please fix validation errors before deploying."
          exit 1